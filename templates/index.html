<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YT Video Downloader</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="container">
        <header>
            <h1>
                <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                    <polyline points="7 10 12 15 17 10"/>
                    <line x1="12" y1="15" x2="12" y2="3"/>
                </svg>
                YT Video Downloader
            </h1>
        </header>

        <section class="url-section">
            <div class="url-input-wrapper">
                <input type="text" id="urlInput" placeholder="Paste a YouTube video link..." autocomplete="off">
                <button id="fetchBtn" onclick="fetchVideoInfo()">
                    <span class="btn-text">Fetch Info</span>
                    <span class="btn-loader hidden"></span>
                </button>
            </div>
            <p id="urlError" class="error-msg hidden"></p>
        </section>

        <section id="videoInfo" class="video-info hidden">
            <div class="video-card">
                <img id="videoThumb" src="" alt="Thumbnail" class="video-thumb">
                <div class="video-details">
                    <h2 id="videoTitle"></h2>
                    <span id="videoDuration" class="video-duration"></span>
                    <div class="quality-selector">
                        <label for="qualitySelect">Quality:</label>
                        <select id="qualitySelect"></select>
                        <span id="estimatedSize" class="estimated-size"></span>
                    </div>
                    <button class="download-btn" onclick="startDownload()">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                            <polyline points="7 10 12 15 17 10"/>
                            <line x1="12" y1="15" x2="12" y2="3"/>
                        </svg>
                        Download
                    </button>
                </div>
            </div>
        </section>

        <section class="downloads-section">
            <h2 class="section-title">Downloads</h2>
            <div id="downloadsList" class="downloads-list">
                <p class="empty-state">No downloads yet.</p>
            </div>
        </section>
    </div>

    <script src="{{ url_for('static', filename='js/app.js') }}"></script>
</body>
</html>
