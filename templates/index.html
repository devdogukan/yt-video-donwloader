<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Downloader</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&display=swap">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="icon" href="{{ url_for('static', filename='favicon.ico') }}">
</head>
<body>
    <div class="container">
        <header>
            <h1>
                <span class="material-symbols-rounded header-icon">motion_play</span>
                Video Downloader
            </h1>
        </header>

        <section class="url-section">
            <div class="url-input-wrapper">
                <span class="material-symbols-rounded input-icon">link</span>
                <input type="text" id="urlInput" placeholder="Paste a video link..." autocomplete="off">
                <button id="fetchBtn" onclick="fetchVideoInfo()">
                    <span class="btn-text">Fetch Info</span>
                    <span class="btn-loader hidden"></span>
                </button>
            </div>
            <p id="urlError" class="error-msg hidden"></p>
        </section>

        <section class="upload-section">
            <input type="file" id="localVideoInput" class="hidden" accept="video/*">
            <button type="button" class="upload-card" id="localUploadCard" aria-label="Upload a video from device">
                <span class="material-symbols-rounded upload-card-icon">upload_file</span>
                <span class="upload-card-title">Upload video</span>
                <span class="upload-card-hint">Choose a file or pick from gallery</span>
                <span class="btn-loader upload-card-loader hidden" aria-hidden="true"></span>
            </button>
            <p id="localUploadError" class="error-msg hidden"></p>
        </section>

        <section id="videoInfo" class="video-info hidden">
            <div class="video-card">
                <img id="videoThumb" src="" alt="Thumbnail" class="video-thumb">
                <div class="video-details">
                    <h2 id="videoTitle"></h2>
                    <span id="videoDuration" class="video-duration">
                        <span class="material-symbols-rounded" style="font-size:16px">schedule</span>
                        <span id="videoDurationText"></span>
                    </span>
                    <div class="quality-selector">
                        <label for="qualitySelect">Quality:</label>
                        <select id="qualitySelect"></select>
                        <span id="estimatedSize" class="estimated-size"></span>
                    </div>
                    <div class="concurrent-selector">
                        <label for="concurrentSelect">Concurrent Fragments:</label>
                        <select id="concurrentSelect">
                            <option value="1">1</option>
                            <option value="2">2</option>
                            <option value="3">3</option>
                            <option value="4">4</option>
                            <option value="5">5</option>
                            <option value="6">6</option>
                            <option value="7">7</option>
                            <option value="8">8</option>
                            <option value="9">9</option>
                            <option value="10">10</option>
                            <option value="11">11</option>
                            <option value="12">12</option>
                            <option value="13">13</option>
                            <option value="14">14</option>
                            <option value="15">15</option>
                            <option value="16">16</option>
                        </select>
                    </div>
                    <div class="download-actions">
                        <button class="download-btn" onclick="startDownload()">
                            <span class="material-symbols-rounded">download</span>
                            Download
                        </button>
                        <label class="queue-toggle">
                            <input type="checkbox" id="queueCheckbox">
                            <span class="material-symbols-rounded" style="font-size:18px">queue</span>
                            Add to Queue
                        </label>
                    </div>
                </div>
            </div>
        </section>

        <section class="downloads-section">
            <div class="section-header">
                <h2 class="section-title">
                    <span class="material-symbols-rounded">folder</span>
                    Downloads
                </h2>
                <button class="refresh-btn" onclick="refreshDownloads()" title="Refresh">
                    <span class="material-symbols-rounded">refresh</span>
                </button>
            </div>
            <div id="downloadsList" class="downloads-list">
                <p class="empty-state">No downloads yet.</p>
            </div>
        </section>
    </div>

    <script src="{{ url_for('static', filename='js/app.js') }}"></script>
</body>
</html>
