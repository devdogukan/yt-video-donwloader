<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Downloader</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="icon" href="{{ url_for('static', filename='favicon.ico') }}">
</head>
<body>
    <div class="container">
        <header>
            <h1>
                <span class="material-symbols-rounded header-icon">motion_play</span>
                Video Downloader
            </h1>
        </header>

        <section class="url-section">
            <div class="url-input-wrapper">
                <span class="material-symbols-rounded input-icon">link</span>
                <input type="text" id="urlInput" placeholder="Paste a video link..." autocomplete="off">
                <button id="fetchBtn" onclick="fetchVideoInfo()">
                    <span class="btn-text">Fetch Info</span>
                    <span class="btn-loader hidden"></span>
                </button>
            </div>
            <p id="urlError" class="error-msg hidden"></p>
        </section>

        <section class="upload-section">
            <input type="file" id="localVideoInput" class="hidden" accept="video/*" multiple>
            <button type="button" class="upload-card" id="localUploadCard" aria-label="Upload a video from device">
                <span class="material-symbols-rounded upload-card-icon">upload_file</span>
                <span class="upload-card-title">Upload video</span>
                <span class="upload-card-hint">Choose a file or pick from gallery</span>
                <span class="btn-loader upload-card-loader hidden" aria-hidden="true"></span>
            </button>
            <p id="localUploadError" class="error-msg hidden"></p>
        </section>

        <section id="videoInfo" class="video-info hidden">
            <div class="video-card">
                <img id="videoThumb" src="" alt="Thumbnail" class="video-thumb">
                <div class="video-details">
                    <h2 id="videoTitle"></h2>
                    <span id="videoDuration" class="video-duration">
                        <span class="material-symbols-rounded" style="font-size:16px">schedule</span>
                        <span id="videoDurationText"></span>
                    </span>
                    <div class="quality-selector">
                        <label for="qualitySelect">Quality:</label>
                        <select id="qualitySelect"></select>
                        <span id="estimatedSize" class="estimated-size"></span>
                    </div>
                    <div class="concurrent-selector">
                        <label for="concurrentSelect">Concurrent Fragments:</label>
                        <select id="concurrentSelect">
                            <option value="1">1</option>
                            <option value="2">2</option>
                            <option value="3">3</option>
                            <option value="4">4</option>
                            <option value="5">5</option>
                            <option value="6">6</option>
                            <option value="7">7</option>
                            <option value="8">8</option>
                            <option value="9">9</option>
                            <option value="10">10</option>
                            <option value="11">11</option>
                            <option value="12">12</option>
                            <option value="13">13</option>
                            <option value="14">14</option>
                            <option value="15">15</option>
                            <option value="16">16</option>
                        </select>
                    </div>
                    <div class="download-actions">
                        <button class="download-btn" onclick="startDownload()">
                            <span class="material-symbols-rounded">download</span>
                            Download
                        </button>
                        <label class="queue-toggle">
                            <input type="checkbox" id="queueCheckbox">
                            <span class="material-symbols-rounded" style="font-size:18px">queue</span>
                            Add to Queue
                        </label>
                    </div>
                </div>
            </div>
        </section>

        <section class="downloads-section">
            <div class="section-header">
                <h2 class="section-title">
                    <span class="material-symbols-rounded">folder</span>
                    Downloads
                </h2>
                <div class="section-header-actions">
                    <button class="new-playlist-btn" onclick="openCreatePlaylistModal()" title="New Playlist">
                        <span class="material-symbols-rounded">playlist_add</span>
                        <span>New Playlist</span>
                    </button>
                    <button class="refresh-btn" onclick="refreshDownloads()" title="Refresh">
                        <span class="material-symbols-rounded">refresh</span>
                    </button>
                </div>
            </div>
            <div id="downloadsList" class="downloads-list">
                <p class="empty-state">No downloads yet.</p>
            </div>
        </section>
    </div>

    <input type="file" id="playlistThumbInput" class="hidden" accept="image/*">

    <div id="playlistPage" class="playlist-page hidden">
        <div class="playlist-page-header">
            <button id="playlistPageBack" class="playlist-page-back" title="Back">
                <span class="material-symbols-rounded">arrow_back</span>
            </button>
            <div class="playlist-page-thumb playlist-page-thumb-clickable" id="playlistPageThumbWrap" title="Change thumbnail">
                <img id="playlistPageThumb" src="" alt="">
                <span class="material-symbols-rounded playlist-page-thumb-icon">queue_music</span>
                <div class="playlist-page-thumb-overlay">
                    <span class="material-symbols-rounded">photo_camera</span>
                </div>
            </div>
            <div class="playlist-page-info">
                <h2 id="playlistPageTitle"></h2>
                <span id="playlistPageMeta" class="playlist-page-meta"></span>
                <div class="progress-bar" style="margin-top:6px">
                    <div id="playlistPageProgress" class="progress-fill" style="width:0%"></div>
                </div>
            </div>
            <div id="playlistPageActions" class="playlist-page-actions"></div>
        </div>
        <div id="playlistPageList" class="playlist-page-list"></div>
    </div>

    <div id="playlistModal" class="modal-overlay hidden">
        <div class="modal playlist-modal">
            <div class="playlist-modal-header">
                <div class="playlist-modal-title-row">
                    <span class="material-symbols-rounded modal-icon" style="color:var(--blue)">queue_music</span>
                    <h3 class="modal-title" id="playlistModalTitle">Playlist</h3>
                    <button type="button" class="playlist-modal-close" id="playlistModalClose" title="Close">
                        <span class="material-symbols-rounded">close</span>
                    </button>
                </div>
                <div class="playlist-modal-controls">
                    <div class="playlist-modal-control-group">
                        <label for="plQualitySelect">Quality:</label>
                        <select id="plQualitySelect"></select>
                    </div>
                    <div class="playlist-modal-control-group">
                        <label for="plConcurrentSelect">Fragments:</label>
                        <select id="plConcurrentSelect">
                            <option value="1">1</option>
                            <option value="2">2</option>
                            <option value="3">3</option>
                            <option value="4" selected>4</option>
                            <option value="5">5</option>
                            <option value="6">6</option>
                            <option value="7">7</option>
                            <option value="8">8</option>
                        </select>
                    </div>
                </div>
                <div class="playlist-modal-toolbar">
                    <label class="playlist-select-all">
                        <input type="checkbox" id="plSelectAll" checked>
                        <span>Select All</span>
                        <span id="plSelectedCount" class="playlist-count-badge">0/0</span>
                    </label>
                    <span class="playlist-total-size" id="plTotalSize"></span>
                </div>
            </div>
            <div class="playlist-video-list" id="playlistVideoList"></div>
            <div class="playlist-modal-footer">
                <button type="button" class="modal-btn modal-btn-cancel" id="playlistModalCancel">Cancel</button>
                <button type="button" class="modal-btn playlist-download-btn" id="playlistDownloadBtn">
                    <span class="material-symbols-rounded">download</span>
                    <span id="playlistDownloadBtnText">Download Selected (0)</span>
                    <span class="btn-loader hidden" id="playlistDownloadLoader"></span>
                </button>
            </div>
        </div>
    </div>

    <div id="createPlaylistModal" class="modal-overlay hidden">
        <div class="modal create-playlist-modal">
            <div class="modal-header">
                <span class="material-symbols-rounded modal-icon" style="color:var(--blue)">playlist_add</span>
                <h3 class="modal-title">New Playlist</h3>
            </div>
            <div class="modal-body">
                <input type="text" id="newPlaylistNameInput" class="modal-text-input" placeholder="Playlist name..." autocomplete="off">
            </div>
            <div class="modal-actions">
                <button type="button" class="modal-btn modal-btn-cancel" id="createPlaylistCancel">Cancel</button>
                <button type="button" class="modal-btn modal-btn-primary" id="createPlaylistSubmit">
                    <span class="material-symbols-rounded">add</span>
                    Create
                </button>
            </div>
        </div>
    </div>

    <div id="addToPlaylistModal" class="modal-overlay hidden">
        <div class="modal add-to-playlist-modal">
            <div class="modal-header">
                <span class="material-symbols-rounded modal-icon" style="color:var(--blue)">playlist_add</span>
                <h3 class="modal-title">Add to Playlist</h3>
            </div>
            <div id="addToPlaylistList" class="add-to-playlist-list"></div>
            <div class="modal-actions">
                <button type="button" class="modal-btn modal-btn-cancel" id="addToPlaylistCancel">Cancel</button>
            </div>
        </div>
    </div>

    <div id="thumbPickerModal" class="modal-overlay hidden">
        <div class="modal thumb-picker-modal">
            <div class="modal-header">
                <span class="material-symbols-rounded modal-icon" style="color:var(--blue)">image</span>
                <h3 class="modal-title">Change Thumbnail</h3>
            </div>
            <div class="thumb-picker-body">
                <button type="button" class="thumb-picker-upload-btn" id="thumbPickerUploadBtn">
                    <span class="material-symbols-rounded">upload</span>
                    Upload Image
                </button>
                <div class="thumb-picker-divider">
                    <span>or pick from videos</span>
                </div>
                <div id="thumbPickerVideoList" class="thumb-picker-video-list"></div>
            </div>
            <div class="modal-actions">
                <button type="button" class="modal-btn modal-btn-cancel" id="thumbPickerCancel">Cancel</button>
            </div>
        </div>
    </div>

    <script src="{{ url_for('static', filename='js/app.js') }}"></script>
</body>
</html>
